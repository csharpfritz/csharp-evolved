      - region "Newer capabilities" [ref=e96]:
        - heading "Newer capabilities" [level=2] [ref=e97]
        - list [ref=e98]:
          - listitem [ref=e99]:
            - article [ref=e100]:
              - heading "Interpolated string handlers and raw interpolated strings" [level=3] [ref=e101]
              - paragraph [ref=e102]:
                - strong [ref=e103]: Introduced in C# 10.0
              - heading "Optional newer-version capability (C# 10+ / C# 11+)" [level=3] [ref=e104]
              - paragraph [ref=e105]: The baseline guidance for this article is C# 6.0.
              - list [ref=e106]:
                - listitem [ref=e107]:
                  - strong [ref=e108]: "C# 10+:"
                  - text: custom interpolated string handlers can reduce allocations in high-performance scenarios.
                - listitem [ref=e109]:
                  - strong [ref=e110]: "C# 11+:"
                  - text: interpolated raw string literals (
                  - code [ref=e111]: $"""..."""
                  - text: ) make multi-line templates and embedded quotes easier to write.
